<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Flexbox Webpage</title>

<style>

/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body */
body {
    font-family: Arial, sans-serif;
}

/* HEADER */
header {
    background: grey;
    color: white;
    padding: 15px;
}

/* Flexbox Navigation */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Nav links */
.nav-links {
    display: flex;
    gap: 15px;
}

.nav-links a {
    color: white;
    text-decoration: none;
}

/* HERO */
.hero {
    background: rgba(0, 132, 255, 0.438);
    color: white;
    padding: 40px;
    text-align: center;
}

/* ABOUT */
.about {
    padding: 25px;
    background: #f4f4f4;
}

/* GALLERY */
.gallery {
    padding: 25px;
}

/* Flexbox Gallery */
.gallery-container {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

/* Gallery Boxes */
.gallery-item {
    background: #ddd;
    padding: 40px;
    text-align: center;

    /* Mobile: 1 column */
    flex: 100%;
}

/* TABLET: 2 columns */
@media (min-width: 600px) {

.gallery-item {
    flex: 48%;
}

}

/* DESKTOP: 3 columns */
@media (min-width: 900px) {

.gallery-item {
    flex: 30%;
}

}

/* FOOTER */
footer {
    background: grey;
    color: white;
    text-align: center;
    padding: 15px;
}

</style>

</head>

<body>

<!-- HEADER -->
<header>

<div class="navbar">

<h2>My Website</h2>

<div class="nav-links">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Gallery</a>
<a href="#">Contact</a>
</div>

</div>

</header>

<!-- HERO -->
<section class="hero">

<h1>Welcome to My Website</h1>

<p>This is my Flexbox responsive webpage.</p>

</section>

<!-- ABOUT -->
<section class="about">

<h2>About Me</h2>

<p>
This webpage uses Flexbox and works on mobile, tablet, and desktop screens.
</p>

</section>

<!-- GALLERY -->
<section class="gallery">

<h2>My Projects</h2>

<div class="gallery-container">

<div class="gallery-item">Project 1</div>

<div class="gallery-item">Project 2</div>

<div class="gallery-item">Project 3</div>

</div>

</section>

<!-- FOOTER -->
<footer>

<p>© 2026 My Website</p>

</footer>

</body>
</html>
